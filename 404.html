<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404-Page Not Found</title>

  <link rel="icon" type="image/jpeg" href="images/favicon.jpg">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: #0b0f1a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .bg {
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, #1a2a6c, #0b0f1a, #000);
      animation: moveBg 10s infinite alternate ease-in-out;
      z-index: -2;
    }

    @keyframes moveBg {
      0% { transform: translate(-10%, -10%) scale(1); }
      100% { transform: translate(10%, 10%) scale(1.2); }
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      animation: floatUp linear infinite;
      opacity: 0.5;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh); opacity: 0; }
      to { transform: translateY(-10vh); opacity: 1; }
    }

    .card {
      width: 92%;
      max-width: 420px;
      padding: 22px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
      animation: popIn 0.7s ease-out;
    }

    @keyframes popIn {
      from { transform: scale(0.6); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid white;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
      70% { box-shadow: 0 0 0 18px rgba(255,255,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }

    h1 {
      font-size: 68px;
      animation: glitch 1.5s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px,2px); }
      40% { transform: translate(2px,-2px); }
      60% { transform: translate(-1px,1px); }
      80% { transform: translate(1px,-1px); }
      100% { transform: translate(0); }
    }

    p {
      opacity: 0.8;
      margin: 8px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 16px;
      border-radius: 10px;
      background: linear-gradient(45deg, #ff4b2b, #ff416c);
      color: white;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      border: none;
    }

    .btn:hover {
      transform: scale(1.08);
    }

    /* GAME BUTTONS */
    .gameBox {
      display: none;
      margin-top: 12px;
    }

    .fixGame {
      display: none;
      margin-top: 12px;
    }

    .draggable {
      width: 130px;
      padding: 10px;
      margin: 10px auto;
      background: #ff416c;
      border-radius: 10px;
      cursor: grab;
    }

    .dropZone {
      width: 200px;
      height: 90px;
      margin: 10px auto;
      border: 2px dashed white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
    }

    /* MOBILE FIX */
    @media (max-width: 600px) {
      h1 { font-size: 48px; }
      .avatar { width: 95px; height: 95px; }
    }

  </style>
</head>

<body>

<div class="bg"></div>

<div class="card">

  <img src="images/profile.jpg" class="avatar" alt="profile">

  <h1>404</h1>
  <p>This page is broken in the multiverse.</p>

  <a class="btn" href="https://www.niroulaarbin.com.np">Back to homepage</a>

  <button class="btn" onclick="startFixGame()">Fix the Page</button>

  <div class="fixGame" id="fixGame">

    <p>Drag items to fix the system</p>

    <div class="dropZone" id="zone">Drop Zone</div>

    <div class="draggable" draggable="true" id="item1">404 TITLE</div>
    <div class="draggable" draggable="true" id="item2">HOME BUTTON</div>

    <p id="status"></p>
  </div>

</div>

<script>
  // particles
  const count = window.innerWidth < 600 ? 15 : 35;

  for (let i = 0; i < count; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(p);
  }

  // GAME LOGIC
  function startFixGame() {
    document.getElementById("fixGame").style.display = "block";
  }

  let dragged = null;

  document.querySelectorAll(".draggable").forEach(el => {
    el.addEventListener("dragstart", () => {
      dragged = el;
    });
  });

  const zone = document.getElementById("zone");

  zone.addEventListener("dragover", e => {
    e.preventDefault();
  });

  zone.addEventListener("drop", () => {
    if (dragged) {
      dragged.remove();
      zone.innerHTML = "SYSTEM FIXED ✔";
      document.getElementById("status").innerText =
        "Page restored successfully";
    }
  });
</script>

</body>
</html>
