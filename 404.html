<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Page Not Found</title>

  <link rel="icon" type="image/jpeg" href="images/favicon.jpg">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: #0b0f1a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .bg {
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, #1a2a6c, #0b0f1a, #000);
      animation: moveBg 10s infinite alternate ease-in-out;
      z-index: -2;
    }

    @keyframes moveBg {
      0% { transform: translate(-10%, -10%) scale(1); }
      100% { transform: translate(10%, 10%) scale(1.2); }
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      opacity: 0.6;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh); opacity: 0; }
      to { transform: translateY(-10vh); opacity: 1; }
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
      animation: popIn 0.8s ease-out;
      max-width: 420px;
      width: 90%;
    }

    @keyframes popIn {
      from { transform: scale(0.6); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* FIXED IMAGE SHRINK ISSUE */
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid white;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
      70% { box-shadow: 0 0 0 20px rgba(255,255,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }

    h1 {
      font-size: 70px;
      animation: glitch 1.5s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px,2px); }
      40% { transform: translate(2px,-2px); }
      60% { transform: translate(-1px,1px); }
      80% { transform: translate(1px,-1px); }
      100% { transform: translate(0); }
    }

    p {
      opacity: 0.8;
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 18px;
      border-radius: 10px;
      background: linear-gradient(45deg, #ff4b2b, #ff416c);
      color: white;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.08);
    }

    /* GAME AREA */
    .gameBox {
      display: none;
      margin-top: 15px;
      padding: 15px;
      border-radius: 12px;
      background: rgba(255,255,255,0.07);
    }

    .box {
      width: 60px;
      height: 60px;
      background: #ff416c;
      margin: 20px auto;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div class="bg"></div>

<div class="card">
  <img src="images/profile.jpg" class="avatar" alt="profile">

  <h1>404</h1>
  <p>This page got lost in the internet void.</p>

  <a class="btn" href="https://www.niroulaarbin.com.np">Back to homepage</a>

  <div>
    <button class="btn" onclick="startGame()">Play Game</button>
  </div>

  <div class="gameBox" id="gameBox">
    <p>Click the moving box</p>
    <div class="box" id="box"></div>
    <p>Score: <span id="score">0</span></p>
  </div>
</div>

<script>
  // particles
  const count = window.innerWidth < 600 ? 15 : 40;
  for (let i = 0; i < count; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(p);
  }

  // GAME LOGIC
  let score = 0;

  function startGame() {
    document.getElementById("gameBox").style.display = "block";
  }

  const box = document.getElementById("box");
  const scoreEl = document.getElementById("score");

  function moveBox() {
    const x = Math.random() * 200;
    const y = Math.random() * 100;
    box.style.transform = `translate(${x}px, ${y}px)`;
  }

  box.addEventListener("click", () => {
    score++;
    scoreEl.innerText = score;
    moveBox();
  });

  setInterval(moveBox, 1200);
</script>

</body>
</html>
