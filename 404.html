<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Page Not Found</title>

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="images/favicon.jpg">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: #0b0f1a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
    }

    /* Animated background glow */
    .bg {
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, #1a2a6c, #0b0f1a, #000);
      animation: moveBg 10s infinite alternate ease-in-out;
      z-index: -2;
    }

    @keyframes moveBg {
      0% { transform: translate(-10%, -10%) scale(1); }
      100% { transform: translate(10%, 10%) scale(1.2); }
    }

    /* Floating particles */
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      opacity: 0.6;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from {
        transform: translateY(100vh);
        opacity: 0;
      }
      to {
        transform: translateY(-10vh);
        opacity: 1;
      }
    }

    /* Card */
    .card {
      background: rgba(255, 255, 255, 0.05);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
      animation: popIn 1s ease-out;
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* Profile image */
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 3px solid white;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
      70% { box-shadow: 0 0 0 20px rgba(255,255,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }

    h1 {
      font-size: 80px;
      letter-spacing: 5px;
      animation: glitch 1.5s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -2px); }
      60% { transform: translate(-1px, 1px); }
      80% { transform: translate(1px, -1px); }
      100% { transform: translate(0); }
    }

    p {
      margin: 10px 0 20px;
      opacity: 0.8;
    }

    /* Button */
    .btn {
      display: inline-block;
      padding: 12px 25px;
      border-radius: 10px;
      background: linear-gradient(45deg, #ff4b2b, #ff416c);
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(255, 65, 108, 0.6);
    }

    .btn::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: -100%;
      background: rgba(255,255,255,0.2);
      transition: 0.4s;
    }

    .btn:hover::after {
      left: 100%;
    }

  </style>
</head>

<body>

  <div class="bg"></div>

  <div class="card">
    <img src="images/profile.jpg" class="avatar" alt="Profile">
    <h1>404</h1>
    <p>Page not found. Even this URL gave up on life.</p>

    <a class="btn" href="https://www.niroulaarbin.com.np">
      Back to homepage
    </a>
  </div>

  <script>
    // floating particles generator
    const count = 40;

    for (let i = 0; i < count; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      p.style.left = Math.random() * 100 + "vw";
      p.style.animationDuration = (3 + Math.random() * 5) + "s";
      p.style.opacity = Math.random();
      document.body.appendChild(p);
    }
  </script>

</body>
</html>
