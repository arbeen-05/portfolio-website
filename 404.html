<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Page Not Found</title>

  <link rel="icon" type="image/jpeg" href="images/favicon.jpg">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b0f1a;
      color: white;
      text-align: center;
    }

    .bg {
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, #1a2a6c, #0b0f1a, #000);
      animation: moveBg 10s infinite alternate;
      z-index: -2;
    }

    @keyframes moveBg {
      0% { transform: translate(-10%, -10%) scale(1); }
      100% { transform: translate(10%, 10%) scale(1.2); }
    }

    .particle {
      position: absolute;
      width: 5px;
      height: 5px;
      background: white;
      border-radius: 50%;
      opacity: 0.4;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }

    .card {
      width: 92%;
      max-width: 520px;
      padding: 20px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
      margin: 30px 0;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid white;
      margin-bottom: 10px;
    }

    h1 { font-size: 60px; }

    p {
      opacity: 0.85;
      margin: 8px 0;
    }

    .btn {
      display: inline-block;
      margin: 6px 5px;
      padding: 10px 16px;
      border-radius: 10px;
      background: linear-gradient(45deg, #ff4b2b, #ff416c);
      color: white;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }

    /* GAME */
    .game {
      display: none;
      margin-top: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .cardBox {
      aspect-ratio: 1;
      background: #1f2a44;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 22px;
      user-select: none;
    }

    .flipped { background: #ff416c; }
    .matched { background: #4caf50; cursor: default; }

    /* CAMERA */
    .cameraBox {
      display: none;
      margin-top: 12px;
    }

    video {
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    }

    .footer {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.7;
    }

    @media (max-width: 600px) {
      h1 { font-size: 42px; }
    }
  </style>
</head>

<body>

<div class="bg"></div>

<div class="card">

  <!-- PROFILE -->
  <img src="images/pfp2.jpg" class="avatar" alt="profile">

  <h1>404</h1>

  <p>Page not found. Even this URL gave up on life.</p>

  <a class="btn" href="https://www.niroulaarbin.com.np">Back to homepage</a>

  <button class="btn" id="gameBtn" onclick="toggleGame()">Play Game</button>

  <!-- GAME -->
  <div class="game" id="game">
    <p>Match all pairs</p>
    <div class="grid" id="grid"></div>
    <p id="status"></p>
  </div>

  <!-- JOKER BUTTON -->
  <button class="btn" id="jokerBtn" onclick="toggleJoker()">Report as Joker Website🤡</button>

  <div id="jokerBox" style="display:none;">
    <p id="msg"></p>
    <button class="btn" id="cameraBtn" onclick="toggleCamera()">Open Front Camera</button>
  </div>

  <!-- CAMERA -->
  <div class="cameraBox" id="cameraBox">
    <video id="video" autoplay playsinline></video>
  </div>

  <div class="footer">
    Copyright Arbin Niroula 2026
  </div>

</div>

<script>
  // particles
  const count = window.innerWidth < 600 ? 15 : 30;

  for (let i = 0; i < count; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(p);
  }

  // GAME
  const symbols = ["🍕","🚀","🎮","⚡","🔥","💀","🌙","🧠"];
  let cards = [...symbols, ...symbols].sort(() => Math.random() - 0.5);

  let first = null;
  let lock = false;
  let matched = 0;

  const grid = document.getElementById("grid");

  function render() {
    grid.innerHTML = "";

    cards.forEach(val => {
      const div = document.createElement("div");
      div.className = "cardBox";
      div.innerText = "❓";
      div.dataset.value = val;

      div.onclick = () => flip(div);
      grid.appendChild(div);
    });
  }

  function flip(card) {
    if (lock || card.classList.contains("matched")) return;

    card.innerText = card.dataset.value;
    card.classList.add("flipped");

    if (!first) {
      first = card;
      return;
    }

    if (first.dataset.value === card.dataset.value) {
      first.classList.add("matched");
      card.classList.add("matched");
      matched += 2;
      first = null;

      if (matched === cards.length) {
        document.getElementById("status").innerText =
          "All matched. System slightly less broken now.";
      }

    } else {
      lock = true;

      setTimeout(() => {
        first.innerText = "❓";
        card.innerText = "❓";
        first.classList.remove("flipped");
        card.classList.remove("flipped");
        first = null;
        lock = false;
      }, 600);
    }
  }

  let gameOpen = false;

  function toggleGame() {
    const game = document.getElementById("game");
    const btn = document.getElementById("gameBtn");

    gameOpen = !gameOpen;

    if (gameOpen) {
      game.style.display = "block";
      btn.innerText = "Close Game";
      matched = 0;
      first = null;
      render();
    } else {
      game.style.display = "none";
      btn.innerText = "Play Game";
    }
  }

  // JOKER FLOW
  let jokerOpen = false;
  let streamRef = null;

  function toggleJoker() {
    const jokerBtn = document.getElementById("jokerBtn");
    const jokerBox = document.getElementById("jokerBox");

    if (!jokerOpen) {
      // Open joker section
      jokerOpen = true;
      jokerBox.style.display = "block";
      document.getElementById("msg").innerText =
        "See your face in the mirror once, then come to talk to me😏\nClick below to open front camera to see yourself first";
      jokerBtn.innerText = "Sorry, I realised";
    } else {
      // Close everything and reset
      jokerOpen = false;
      stopCamera();
      jokerBox.style.display = "none";
      document.getElementById("cameraBox").style.display = "none";
      document.getElementById("cameraBtn").innerText = "Open Front Camera";
      jokerBtn.innerText = "Report as Joker Website🤡";
    }
  }

  // CAMERA TOGGLE
  let cameraOpen = false;

  function toggleCamera() {
    const cameraBtn = document.getElementById("cameraBtn");

    if (!cameraOpen) {
      openCamera();
    } else {
      stopCamera();
      cameraBtn.innerText = "Open Front Camera";
      cameraOpen = false;
    }
  }

  function openCamera() {
    const video = document.getElementById("video");
    const camBox = document.getElementById("cameraBox");
    const cameraBtn = document.getElementById("cameraBtn");

    navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    })
    .then(stream => {
      streamRef = stream;
      video.srcObject = stream;
      camBox.style.display = "block";
      cameraBtn.innerText = "Close Camera";
      cameraOpen = true;
    })
    .catch(() => {
      document.getElementById("msg").innerText =
        "Camera blocked. Device refused.";
    });
  }

  function stopCamera() {
    const video = document.getElementById("video");
    if (streamRef) {
      streamRef.getTracks().forEach(track => track.stop());
      streamRef = null;
    }
    video.srcObject = null;
    document.getElementById("cameraBox").style.display = "none";
    cameraOpen = false;
  }
</script>

</body>
</html>
