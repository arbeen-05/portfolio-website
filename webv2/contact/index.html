<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Arbin Niroula</title>
  <link rel="icon" href="../images/favicon.jpg" type="image/jpeg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../images/shared.css" />
  <link rel="stylesheet" href="contact.css" />
</head>
<body>
  <div id="nav-placeholder"></div>

  <section class="page-header pt-nav">
    <div class="container">
      <span class="section-label reveal">Say Hello</span>
      <h1 class="page-title reveal">Contact</h1>
      <div class="divider reveal"></div>
    </div>
  </section>

  <section class="contact-main">
    <div class="container contact-grid">

      <!-- INFO PANEL -->
      <div class="contact-info reveal">
        <h2>Let's talk.</h2>
        <p>Whether you have a project in mind, a question about my services, or just want to connect — I'd love to hear from you. I typically respond within 24 hours.</p>

        <div class="contact-channels">
          <a href="mailto:info@niroulaarbin.com.np" class="channel-row">
            <span class="channel-icon"><i class="fas fa-envelope"></i></span>
            <div>
              <span class="channel-label">Email</span>
              <span class="channel-val">info@niroulaarbin.com.np</span>
            </div>
          </a>
          <a href="https://wa.me/9779861453873" target="_blank" rel="noopener" class="channel-row">
            <span class="channel-icon"><i class="fab fa-whatsapp"></i></span>
            <div>
              <span class="channel-label">WhatsApp</span>
              <span class="channel-val">+977 9861453873</span>
            </div>
          </a>
        </div>

        <div class="social-links">
          <a href="https://www.facebook.com/arbineyyy" target="_blank" rel="noopener" class="social-link" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
          <a href="https://www.instagram.com/arbiinn._" target="_blank" rel="noopener" class="social-link" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
          <a href="https://www.tiktok.com/@arbinniroula204" target="_blank" rel="noopener" class="social-link" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
          <a href="https://www.youtube.com/@arbiinn" target="_blank" rel="noopener" class="social-link" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
          <a href="https://www.snapchat.com/add/arbineyyy" target="_blank" rel="noopener" class="social-link" aria-label="Snapchat"><i class="fab fa-snapchat-ghost"></i></a>
          <a href="https://www.threads.net/@arbiinn._" target="_blank" rel="noopener" class="social-link" aria-label="Threads">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.22 8.22 0 0 0 4.81 1.55V6.79a4.85 4.85 0 0 1-1.04-.1z"/></svg>
          </a>
        </div>
      </div>

      <!-- FORM -->
      <div class="contact-form-wrap reveal" style="transition-delay:0.15s">
        <form id="contactForm" action="https://formspree.io/f/movlyqrg" method="POST" class="contact-form">
          <div class="form-row">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="Your name" required />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="your@email.com" required />
            </div>
          </div>
          <div class="form-group">
            <label for="whatsapp">WhatsApp Number <span class="optional">(optional)</span></label>
            <input type="tel" id="whatsapp" name="whatsapp" placeholder="+977 ..." pattern="^\+?[0-9\s\-]{7,15}$" />
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="What's this about?" required />
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" placeholder="Tell me about your project or question…" required></textarea>
          </div>
          <button type="submit" class="btn-primary form-submit" id="submitBtn">
            <span id="btnText">Send Message</span>
          </button>
          <div id="formMessage" class="form-message"></div>
        </form>
      </div>

    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="../images/shared.js"></script>
  <script src="contact.js"></script>
</body>
</html>
